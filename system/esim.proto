syntax = "proto3";

package particle.system.esim;

/**
 * Payload of a `EUICC` request.
 *
 * See `ManagerRequest`.
 */
message EuiccRequest {
  bytes data = 1; // ASN.1-encoded request data.
}

/**
 * Payload of a `EUICC` response.
 *
 * See `ManagerResponse`.
 */
message EuiccResponse {
  bytes data = 1; // ASN.1-encoded response data.
}

/**
 * Payload of a `GET_LOG` request.
 *
 * See `ManagerRequest`.
 */
message GetLogRequest {
}

/**
 * Payload of a `GET_LOG` response.
 *
 * See `ManagerResponse`.
 */
message GetLogResponse {
  string log = 1; // Log data.
}

/**
 * eSIM manager request.
 */
message ManagerRequest {
  /**
   * Request type.
   */
  enum Type {
    INVALID = 0; // Invalid request type.
    EUICC = 1; // Send a request to the eUICC.
    GET_LOG = 2; // Get the log of the last operation.
  }

  Type type = 1; // Request type

  /**
   * Request data.
   */
  oneof data {
    EuiccRequest euicc = 10;
    GetLogRequest get_log = 11;
  }
}

/**
 * eSIM manager response.
 */
message ManagerResponse {
  /**
   * Result code.
   */
  enum Result {
    OK = 0;
  };

  /**
   * Result code.
   *
   * Protocol-specific codes are defined by the `Result` enum.
   *
   * A negative value indicates a Device OS system error:
   *
   * https://github.com/particle-iot/device-os/blob/develop/services/inc/system_error.h
   */
  sint32 result = 1;

  /**
   * Response data.
   */
  oneof data {
    EuiccResponse euicc = 10;
    GetLogResponse get_log = 11;
  }
}
